<style>
:root {
  --green:#1B4332;--green2:#2D6A4F;--green3:#40916C;
  --gold:#B8962E;--gold2:#D4AF61;--gold3:#F0D080;
  --ivory:#FAF8F2;--ivory2:#EDE8DF;--ivory3:#DDD6CB;
  --brown:#2C2420;--brown2:#6B5F58;--brown3:#9E9189;
  --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;font-weight:300;color:var(--brown);background:var(--ivory);line-height:1.75;font-size:16px;}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(15,40,25,0.96);backdrop-filter:blur(12px);padding:0.9rem 2.5rem;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{font-family:'Great Vibes',cursive;font-size:1.6rem;color:var(--gold2);text-decoration:none;letter-spacing:0.02em;}
.nav-links{display:flex;gap:1.8rem;list-style:none;}
.nav-links a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold2);}
.nav-right{display:flex;align-items:center;gap:1.5rem;}
.lang-switcher{display:flex;gap:0.4rem;}
.lang-btn{background:none;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.6);padding:0.28rem 0.65rem;cursor:pointer;font-size:0.75rem;letter-spacing:0.08em;border-radius:2px;font-family:'Lato',sans-serif;transition:all 0.2s;}
.lang-btn:hover,.lang-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:22px;height:1.5px;background:rgba(255,255,255,0.8);}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:var(--green);padding:7rem 2rem 4rem;position:relative;overflow:hidden;}
#hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(64,145,108,0.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(184,150,46,0.12) 0%,transparent 50%);pointer-events:none;}
.hero-script{font-family:'Great Vibes',cursive;font-size:clamp(3.2rem,9vw,6.5rem);color:var(--gold2);line-height:1.05;margin-bottom:0.4rem;position:relative;}
.hero-ampersand{color:var(--gold3);font-size:0.85em;}
.hero-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,2.5vw,1.35rem);color:rgba(255,255,255,0.6);font-weight:300;margin-bottom:0.8rem;letter-spacing:0.04em;}
.hero-date{font-family:'Lato',sans-serif;font-size:0.8rem;color:rgba(255,255,255,0.9);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:0.35rem;}
.hero-location{font-size:0.75rem;color:rgba(255,255,255,0.45);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:3.5rem;}
.hero-ornament{color:var(--gold);font-size:1rem;letter-spacing:0.8rem;margin-bottom:3rem;opacity:0.6;}
.countdown{display:flex;align-items:center;gap:1.5rem;margin-bottom:0;}
.countdown-unit{text-align:center;}
.countdown-num{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,3.8rem);font-weight:300;color:#fff;line-height:1;display:block;}
.countdown-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:0.3rem;display:block;}
.countdown-dot{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold2);align-self:flex-start;margin-top:0.5rem;opacity:0.6;}
.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.5rem;color:rgba(255,255,255,0.3);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
.scroll-arrow{width:18px;height:10px;border-bottom:1px solid rgba(255,255,255,0.3);border-right:1px solid rgba(255,255,255,0.3);transform:rotate(45deg);margin-top:-6px;}

/* ── SECTIONS ── */
section{padding:5.5rem 2rem;}
section:not(#hero):nth-of-type(even){background:var(--ivory2);}
.container{max-width:880px;margin:0 auto;}
.section-eyebrow{font-size:0.7rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:0.7rem;font-weight:400;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:400;color:var(--green);margin-bottom:0.5rem;line-height:1.15;}
.section-lead{font-size:1.05rem;color:var(--brown2);margin-bottom:2.5rem;max-width:620px;}
.ornament-divider{text-align:center;margin:2.5rem 0;color:var(--gold2);letter-spacing:0.7rem;font-size:0.9rem;opacity:0.5;}

/* ── WEDDING DETAILS CARD ── */
.wedding-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-top:2rem;}
.detail-card{background:#fff;border:1px solid var(--ivory3);border-radius:3px;padding:1.8rem 1.5rem;text-align:center;}
.detail-card .icon{font-size:1.6rem;margin-bottom:0.8rem;}
.detail-card h3{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--green);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.6rem;}
.detail-card p{font-size:0.9rem;color:var(--brown2);margin:0;line-height:1.5;}
.placeholder{color:var(--gold);font-style:italic;}

/* ── LISTS ── */
.info-rows{list-style:none;margin:1.5rem 0;}
.info-rows li{display:flex;gap:1rem;padding:0.75rem 0;border-bottom:1px solid var(--ivory3);font-size:0.93rem;color:var(--brown2);align-items:flex-start;}
.info-rows li:last-child{border-bottom:none;}
.info-rows .lbl{font-weight:700;color:var(--green);min-width:150px;font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;padding-top:0.05rem;flex-shrink:0;}

/* ── CARDS ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.4rem;margin-top:2rem;}
.card{background:#fff;border:1px solid var(--ivory3);border-radius:3px;padding:1.5rem;}
.card .card-top{display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;}
.card .card-icon{font-size:1.4rem;}
.card h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--green);margin:0;}
.card p{font-size:0.88rem;color:var(--brown2);margin:0;}
.card .tag{margin-top:0.8rem;}
.tag{display:inline-block;font-size:0.68rem;padding:0.2rem 0.65rem;border-radius:2px;letter-spacing:0.07em;text-transform:uppercase;font-weight:700;margin-right:0.4rem;margin-bottom:0.3rem;}
.tag-green{background:#E8F5E9;color:#1B4332;}
.tag-gold{background:#FFF8E1;color:#6D4C00;}
.tag-red{background:#FFEBEE;color:#7B1F1F;}
.tag-blue{background:#E3F2FD;color:#0D47A1;}

/* ── INFO BOXES ── */
.info-box{background:#F1F8F4;border-left:3px solid var(--green3);padding:1rem 1.4rem;margin:1.5rem 0;border-radius:0 3px 3px 0;}
.info-box p{margin:0;font-size:0.9rem;color:var(--brown);}
.warn-box{background:#FFFBEB;border-left:3px solid #F59E0B;padding:1rem 1.4rem;margin:1.5rem 0;border-radius:0 3px 3px 0;}
.warn-box p{margin:0;font-size:0.9rem;color:var(--brown);}

/* ── VACCINATIONS TABLE ── */
.vac-table{width:100%;border-collapse:collapse;margin-top:1.5rem;font-size:0.88rem;}
.vac-table th{background:var(--green);color:#fff;padding:0.7rem 1rem;text-align:left;font-weight:700;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;}
.vac-table td{padding:0.7rem 1rem;border-bottom:1px solid var(--ivory3);color:var(--brown2);vertical-align:top;}
.vac-table tr:last-child td{border-bottom:none;}
.vac-table tr:hover td{background:var(--ivory);}

/* ── FAQ ── */
.faq-item{border-bottom:1px solid var(--ivory3);}
.faq-q{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--green);cursor:pointer;padding:1.2rem 0;display:flex;justify-content:space-between;align-items:center;font-weight:400;user-select:none;}
.faq-q::after{content:'+';font-size:1.6rem;font-weight:300;color:var(--gold2);flex-shrink:0;margin-left:1rem;transition:transform 0.25s;}
.faq-q.open::after{transform:rotate(45deg);}
.faq-a{display:none;padding:0 0 1.2rem;font-size:0.93rem;color:var(--brown2);line-height:1.75;}
.faq-a.open{display:block;}
.faq-a p{margin:0 0 0.6rem;}
.faq-a p:last-child{margin-bottom:0;}

/* ── CONTACT ── */
#contact{background:var(--green);text-align:center;}
#contact .section-title{color:var(--gold2);}
#contact .section-lead{color:rgba(255,255,255,0.7);max-width:540px;margin-left:auto;margin-right:auto;}
#contact .section-eyebrow{color:rgba(255,255,255,0.4);}
.rsvp-btn{display:inline-block;background:var(--gold);color:#fff;padding:1rem 2.8rem;text-decoration:none;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;border-radius:2px;margin-top:2rem;transition:background 0.2s;font-family:'Lato',sans-serif;font-weight:700;}
.rsvp-btn:hover{background:var(--gold2);}
.contact-details{display:flex;justify-content:center;gap:3rem;margin-top:2.5rem;flex-wrap:wrap;}
.contact-item{text-align:center;}
.contact-item .ci-label{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.4rem;}
.contact-item .ci-value{color:rgba(255,255,255,0.85);font-size:0.95rem;}
.contact-item a{color:var(--gold2);text-decoration:none;}

/* ── FOOTER ── */
footer{background:#0C1F14;color:rgba(255,255,255,0.3);text-align:center;padding:2rem;font-size:0.78rem;letter-spacing:0.06em;}
footer a{color:rgba(255,255,255,0.4);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav{padding:0.8rem 1.2rem;}
  .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(10,28,18,0.98);flex-direction:column;padding:1.2rem 1.5rem;gap:1rem;}
  .nav-links.open{display:flex;}
  .hamburger{display:flex;}
  section{padding:4rem 1.2rem;}
  .info-rows .lbl{min-width:120px;}
  .countdown{gap:0.8rem;}
  .countdown-dot{font-size:1.4rem;}
  .vac-table{font-size:0.8rem;}
  .vac-table th,.vac-table td{padding:0.5rem 0.6rem;}
  .contact-details{gap:1.5rem;}
}
</style>
</head>

/* ════════════════════════════════════════════
   LANGUAGE SWITCHER
   ════════════════════════════════════════════ */
let currentLang = 'de';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => { if(b.textContent.toLowerCase()===lang) b.classList.add('active'); });

  const t = T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if(t[key] !== undefined) el.textContent = t[key];
  });

  // Rich sections
  const s = sections;
  ['travel','visa','health','hotels','transport','food','practical'].forEach(id => {
    const el = document.getElementById(id+'-content');
    if(el && s[id] && s[id][lang]) el.innerHTML = s[id][lang];
  });

  if(s.sights && s.sights[lang]) document.getElementById('sights-content').innerHTML = s.sights[lang];
  if(s.daytrips && s.daytrips[lang]) document.getElementById('daytrips-content').innerHTML = s.daytrips[lang];
  if(s.safety && s.safety[lang]) document.getElementById('safety-content').innerHTML = s.safety[lang];

  renderFaq(lang);
  document.getElementById('nav-links').classList.remove('open');
}

function renderFaq(lang) {
  const faqs = sections.faq[lang];
  if(!faqs) return;
  const container = document.getElementById('faq-content');
  container.innerHTML = faqs.map((item, i) => `
    <div class="faq-item">
      <div class="faq-q" onclick="toggleFaq(this)">${item.q}</div>
      <div class="faq-a">${item.a.split('\n').map(p=>`<p>${p}</p>`).join('')}</div>
    </div>`).join('');
}

function toggleFaq(el) {
  const ans = el.nextElementSibling;
  const isOpen = ans.classList.contains('open');
  document.querySelectorAll('.faq-q.open').forEach(q => { q.classList.remove('open'); q.nextElementSibling.classList.remove('open'); });
  if(!isOpen) { el.classList.add('open'); ans.classList.add('open'); }
}

/* ════════════════════════════════════════════
   COUNTDOWN
   ════════════════════════════════════════════ */
function initCountdown() {
  const target = new Date('2026-10-18T14:00:00-03:00');
  function tick() {
    const now = new Date();
    const diff = target - now;
    if(diff <= 0) { document.getElementById('countdown').innerHTML='<p style="color:#fff;font-size:1.2rem">🎉</p>'; return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-mins').textContent = String(m).padStart(2,'0');
    document.getElementById('cd-secs').textContent = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);
}
