name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install
      - name: Build Web App
        run: bun run build
      - name: Debug - show build output
        run: |
          echo "=== Root ===" && ls -la
          echo "=== dist/ ===" && ls -la dist/ 2>/dev/null || echo "no dist folder"
          echo "=== .output/ ===" && ls -la .output/ 2>/dev/null || echo "no .output folder"
          echo "=== dist/client/ ===" && ls -la dist/client/ 2>/dev/null || echo "no dist/client folder"
          echo "=== dist/public/ ===" && ls -la dist/public/ 2>/dev/null || echo "no dist/public folder"
          echo "=== dist/static/ ===" && ls -la dist/static/ 2>/dev/null || echo "no dist/static folder"
      - name: Inject CNAME into build
        run: echo "hochzeit.finanzsommer.com" > ./dist/CNAME
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy Live
        id: deployment
        uses: actions/deploy-pages@v4
